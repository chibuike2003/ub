<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact UB Tech</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; }
        header { padding: 1rem 10%; display: flex; justify-content: space-between; background: white; }
        
        .contact-wrap { 
            max-width: 1000px; 
            margin: 60px auto; 
            display: grid; 
            grid-template-columns: 1fr 1.5fr;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
        }

        .info-pane { background: var(--dark); color: white; padding: 50px; }
        .form-pane { padding: 50px; }

        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0 20px; 
            border: 1px solid #e2e8f0; 
            border-radius: 6px; 
            background: #f1f5f9;
        }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer;
            width: 100%;
        }

        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="UB Logo" style="height:40px;">
        <nav style="display: flex; align-items: center;">
            <a href="index.html" style="text-decoration:none; color:var(--dark); font-weight:600;">Back to Home</a>
        </nav>
    </header>

    <div class="contact-wrap">
        <div class="info-pane">
            <h2>Contact Us</h2>
            <p style="opacity: 0.7; margin: 20px 0;">Let's discuss how UB Multipurpose Technology can optimize your operations.</p>
            <div style="margin-top: 40px;">
                <p><strong>Email:</strong> hello@ubtech.com</p>
                <p><strong>Phone:</strong> +234 800 UBTECH</p>
            </div>
        </div>
        <div class="form-pane">
            <form>
                <label>Name</label>
                <input type="text" placeholder="Your name">
                <label>Email</label>
                <input type="email" placeholder="email@company.com">
                <label>Message</label>
                <textarea rows="4" placeholder="How can we help?"></textarea>
                <button type="submit">Submit Request</button>
            </form>
        </div>
    </div>
</body>
</html>
