<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | UB Tech</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: var(--bg); }

        header { background: white; padding: 1rem 10%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        header img { height: 40px; }

        /* Menu Button */
        .menu-toggle { display: none; flex-direction: column; cursor: pointer; gap: 5px; background: none; border: none; }
        .menu-toggle span { display: block; width: 25px; height: 3px; background: var(--dark); }

        nav ul { display: flex; list-style: none; gap: 20px; }
        nav a { text-decoration: none; color: var(--dark); font-weight: 600; }

        .container { padding: 80px 10%; text-align: center; }
        .service-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 50px; }
        .s-card { background: white; padding: 40px 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; }
        .s-card:hover { transform: translateY(-5px); border-top: 4px solid var(--primary); }

        @media (max-width: 900px) { .service-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) {
            header { padding: 1rem 5%; }
            .menu-toggle { display: flex; }
            nav ul { display: none; flex-direction: column; position: absolute; top: 70px; left: 0; width: 100%; background: white; padding: 20px; text-align: center; }
            nav ul.active { display: flex; }
            .service-grid { grid-template-columns: 1fr; }
            .container { padding: 40px 5%; }
        }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="UB Logo">
        <button class="menu-toggle" id="mobile-menu"><span></span><span></span><span></span></button>
        <nav><ul id="nav-list"><li><a href="index.html">Home</a></li><li><a href="services.html">Services</a></li><li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li></ul></nav>
    </header>

    <div class="container">
        <h1>Versatile Solutions</h1>
        <div class="service-grid">
            <div class="s-card"><h2>Software</h2><p>Custom enterprise and mobile app development.</p></div>
            <div class="s-card"><h2>Networking</h2><p>Advanced security and IT infrastructure setup.</p></div>
            <div class="s-card"><h2>Consulting</h2><p>Strategic technology roadmaps for growth.</p></div>
        </div>
    </div>

    <script>
        const menuToggle = document.getElementById('mobile-menu');
        const navList = document.getElementById('nav-list');
        menuToggle.addEventListener('click', () => navList.classList.toggle('active'));
    </script>
</body>
</html>
